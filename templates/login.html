<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — Департамент пробации КР</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#0f2744 50%,#1a3a5c 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:420px;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo{text-align:center;margin-bottom:32px}
.emblem{width:80px;height:80px;background:linear-gradient(135deg,#c9a227,#e8c547);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:34px;box-shadow:0 8px 32px rgba(201,162,39,.4)}
.title{color:#fff;font-size:18px;font-weight:700;line-height:1.4}
.sub{color:rgba(255,255,255,.45);font-size:12.5px;margin-top:4px}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:32px}
.group{margin-bottom:18px}
label{display:block;color:rgba(255,255,255,.65);font-size:11.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
input{width:100%;padding:12px 15px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:9px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s}
input:focus{border-color:rgba(201,162,39,.6);background:rgba(255,255,255,.12)}
input::placeholder{color:rgba(255,255,255,.28)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#c9a227,#e8c547);border:none;border-radius:9px;color:#0f2744;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,162,39,.35)}
.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="emblem">⚖️</div>
    <div class="title">Департамент пробации<br>Кыргызской Республики</div>
    <div class="sub">Информационная система управления</div>
  </div>
  <div class="card">
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="Введите логин" autofocus>
      </div>
      <div class="group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль">
      </div>
      <button class="btn" type="submit">Войти в систему</button>
    </form>
  </div>
</div>
</body>
</html>
